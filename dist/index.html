<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Branch Capital</title>
    <meta name="description" content="Main Branch Capital — Advisory by referral.">
    <link rel="icon" type="image/svg+xml" href="/assets/images/badge-navy-rounded.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0F2540;
            --ink: #14181E;
            --copper: #D08A3E;
            --fork-grey: #54637A;
            --white: #FFFFFF;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--deep-navy);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 480px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 3rem;
            opacity: 0.9;
        }
        
        .wordmark {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            color: var(--white);
        }
        
        .divider {
            width: 40px;
            height: 1px;
            background: var(--copper);
            margin: 0 auto 3rem;
        }
        
        .statement {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.9;
            color: var(--fork-grey);
            margin-bottom: 1rem;
        }
        
        .referral {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--copper);
            margin-top: 3rem;
        }
        
        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/assets/images/badge-light-circle.svg" alt="" class="logo">
        
        <h1 class="wordmark">Main Branch Capital</h1>
        
        <div class="divider"></div>
        
        <p class="statement">
            Strategic advisory for marketing technology, 
            AI transformation, and go-to-market excellence.
        </p>
        
        <p class="referral">By referral only</p>
    </div>
    
    <footer>New York</footer>
</body>
</html>
